<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastro.css">
    <title>Cadastro</title>
</head>

<body>

    <main class="area-cadastro">
        <section>
            <h1>Cadastro de usuário</h1>
        </section>

        <section class="area-formulario">
            <form action="#" class="form-cadastro">

                <div class="area-nome formatacao">
                    <div class="primeiro-nome">
                        <label for="nome">nome</label>
                        <input type="text" id="nome" placeholder="digite seu nome">
                    </div>

                    <div class="ultimo-nome ">
                        <label for="sobrenome">sobrenome</label>
                        <input type="text" id="sobrenome" placeholder="digite sue sobrenome">
                    </div>
                </div>

                <div class="area-acesso formatacao">

                    <div class="email">
                        <label for="email">email</label>
                        <input type="email" id="email" placeholder="digite seu email" required>
                    </div>

                    <div class="senha">
                        <label for="senha">senha</label>
                        <input type="password" id="senha" placeholder="••••••" required>
                    </div>
                </div>

                <div class="area-contato formatacao">
                    <div class="ddd">
                        <label for="ddd">ddd</label>
                        <input type="number" max="99" id="ddd" placeholder="ddd" required>
                    </div>

                    <div class="telefone">
                        <label for="telefone">telefone</label>
                        <input type="text" id=" telefone" placeholder="Digite seu telefone" required>
                    </div>
                </div>


                <div class="area-endereco formatacao">
                    <div class="endereco-numero">
                        <div class="endereco">
                            <label for="endereço">endereço</label>
                            <input type="text" id="endereco" placeholder="Digite seu endereço aqui" required>
                        </div>

                        <div class="numero">
                            <label for="numero">Numero</label>
                            <input type="number" id="numero" placeholder="000">
                        </div>
                    </div>

                    <div class="cidade-cep">
                        <div class="cidade">
                            <label for="cidade">Cidade</label>
                            <input type="text" id="cidade" placeholder="cidade">
                        </div>

                        <div class="cep">
                            <label for="CEP">CEP</label>
                            <input type="number" id="cep" placeholder="00000-000">
                        </div>
                    </div>
                </div>

                <div class="area-dados formatacao">
                    <div class="data-nascimento">
                        <label for="data de nascimento">Data de nascimento</label>
                        <input type="date" id=" data-nascimento" required>
                    </div>

                    <div class="genero">
                        <label for="genero">Gênero</label>
                        <select id="genero" required>
                            <option value="#" disabled selected>Selecione seu genero</option>
                            <option value="#">Femenino</option>
                            <option value="#">Masculino</option>
                            <option value="#">Outro</option>
                            <option value="#">Prefiro não responder</option>
                        </select>
                    </div>
                </div>
                
                <div class="area-botão formatacao">
                    <button type="submit" id="botão-cadasstrar">Cadastrar</button>
                    <a href="#" class="link-login"> Já possui uma conta? Acesse agora</a>
                </div>

            </form>
        </section>
    </main>

</body>

</html>
