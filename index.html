<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Site da Tia Sônia </title>
</head>

<body>    
 
<header>

   <nav>

       <div> <img src="imagens-sônia/logo-tia-sonia.png" alt="logo-tia-sonia" width="150px"></div>

         <ul>
            <li><a class="icones" href="#"><i class="fa fa-home" aria-hidden="true"></i></a></li>
            <li><a class="icones" href="#"><i class="fa-solid fa-scissors"></i></a></li>
            <li><a class="icones" href="#"><i class="fa fa-cart-arrow-down" aria-hidden="true"></i></a></li>
            <li><a class="icones" href="#"><i class="fa-solid fa-circle-user"></i></a></li>
        </ul>
   </nav>

</header>

<main>
    <article class="area-banner">
        <section id="banner">
            <img src="imagens-sônia/banner.png" alt="Banner da sônia" id="banner__image" width="1100px">
        </section>

        <section class="reserva">
            <h2 id="reservas"> Vagas na agenda da semana: 3 disponiveis</h2>
            <button id="reservas_butão"> Reservar vaga</button>
        </section>
    </article>

    <article class="area-sobre">
        <section class="sobre">

            <h1>conheça a Tia Sônia</h1>
            <p> A Tia Sônia está feliz em ter voçê por  aqui, ela borda todos os dias e ama oque faz, se voçê  gosta de bordados, conheça o seu  catalogo e faça uma reserva. </p>

        </section>

        <section class="sobre">
            <img  class="sobre__foto" src="imagens-sônia/tia-sonia.png" alt="mulher de terceira idade com cabelos grisalhos em um jardim de rosas.">

        </section>
    </article>
</main>


</body>
</html>
